<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NPS Discretionary No-Bid Contracts by Administration</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      color: #1a1a1a;
      background: #fff;
      padding: 2.5rem 1.5rem;
    }

    .container {
      max-width: 780px;
      margin: 0 auto;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-size: 14px;
      color: #555;
      margin-bottom: 2rem;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 1.5rem;
    }

    .card {
      background: #f5f5f3;
      border-radius: 8px;
      padding: 1rem;
      text-align: center;
    }

    .card.highlight {
      border: 2px solid #f09595;
      background: #fff;
    }

    .card-label {
      font-size: 12px;
      color: #888;
      margin-bottom: 4px;
    }

    .card-value {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .card-sub {
      font-size: 11px;
      color: #888;
    }

    .chart-wrapper {
      position: relative;
      width: 100%;
      height: 360px;
    }

    .callout {
      background: #fcebeb;
      border-radius: 8px;
      padding: 0.875rem 1rem;
      margin-top: 1.25rem;
      font-size: 13px;
      color: #791f1f;
      line-height: 1.55;
    }

    .source {
      font-size: 11px;
      color: #aaa;
      margin-top: 1rem;
      line-height: 1.5;
    }

    .source a {
      color: #aaa;
    }

    @media (max-width: 500px) {
      .cards {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 18px;
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <h1>NPS discretionary no-bid contracts by administration</h1>
    <p class="subtitle" id="subtitle"></p>

    <div class="cards" id="cards"></div>

    <div class="chart-wrapper">
      <canvas id="chart" role="img"></canvas>
    </div>

    <div class="callout" id="callout"></div>

    <p class="source" id="source"></p>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <script>
    const VIZ_DATA = /* __VIZ_DATA__ */null/* end */;

    const days = VIZ_DATA.days;
    const admins = VIZ_DATA.admins; // [{name, total_m, count}, ...]
    const trump2 = admins.find(a => a.name === 'Trump II');
    const biden  = admins.find(a => a.name === 'Biden');
    const trump1 = admins.find(a => a.name === 'Trump I');

    function fmtM(v) {
      return '$' + (Math.round(v * 10) / 10).toFixed(1) + 'M';
    }

    // Subtitle
    document.getElementById('subtitle').textContent =
      'Urgency (FAR 6.302-2) no-bid contracts · First ' + days + ' days ·' +
      ' Excludes statutory (AbilityOne/8(a)), utilities, and sole-source IDV task orders';

    // Cards
    const cardsEl = document.getElementById('cards');
    admins.forEach(function(a) {
      const div = document.createElement('div');
      div.className = 'card' + (a.name === 'Trump II' ? ' highlight' : '');
      div.innerHTML =
        '<div class="card-label">' + a.name + '</div>' +
        '<div class="card-value">' + fmtM(a.total_m) + '</div>' +
        '<div class="card-sub">' + a.count + ' new contracts</div>';
      cardsEl.appendChild(div);
    });

    // Callout
    const bidenX  = Math.round(trump2.total_m / biden.total_m);
    const trump1X = Math.round(trump2.total_m / trump1.total_m);
    const calloutEl = document.getElementById('callout');
    calloutEl.innerHTML =
      'NPS urgency contracts (FAR 6.302-2) total <strong>' + fmtM(trump2.total_m) + ' under Trump II</strong> — ' +
      bidenX + '× Biden’s ' + fmtM(biden.total_m) + ' and nearly ' + trump1X + '× Trump I’s ' +
      fmtM(trump1.total_m) + ', within the same first ' + days + '-day window.';

    // Source note
    document.getElementById('source').innerHTML =
      'First ' + days + ' days per administration (Jan. 20 inauguration through equivalent date). ' +
      'Counts contracts by first award date (excludes modifications from prior administrations). ' +
      'Includes urgency task orders under IDV/GSA Schedule vehicles. Excludes AbilityOne/8(a) (OTH), ' +
      'regulated utilities (UT), only-one-source (ONE), and unique-source (UNQ). ' +
      'Source: <a href="https://api.usaspending.gov">USASpending.gov</a> FPDS bulk download, transaction-level data.';

    // Chart
    new Chart(document.getElementById('chart'), {
      type: 'bar',
      data: {
        labels: admins.map(a => a.name),
        datasets: [{
          label: 'Urgency (FAR 6.302-2)',
          data: admins.map(a => a.total_m),
          backgroundColor: '#E24B4A',
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: function(ctx) {
                const v = ctx.parsed.y;
                if (v < 0.005) return null;
                return ' ' + ctx.dataset.label + ': $' + v.toFixed(1) + 'M';
              },
              footer: function(items) {
                const total = items.reduce(function(s, i) { return s + i.parsed.y; }, 0);
                return 'Total: $' + total.toFixed(1) + 'M';
              }
            }
          }
        },
        scales: {
          x: {
            stacked: true,
            grid: { display: false },
            ticks: { font: { size: 13 }, color: '#444' }
          },
          y: {
            stacked: true,
            grid: { color: 'rgba(0,0,0,0.06)' },
            ticks: {
              font: { size: 11 },
              color: '#666',
              callback: function(v) { return '$' + v + 'M'; }
            },
            title: {
              display: true,
              text: 'Obligated ($ millions)',
              color: '#666',
              font: { size: 11 }
            }
          }
        }
      }
    });
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/iframe-resizer/4.3.11/iframeResizer.contentWindow.min.js"></script>
</body>

</html>
